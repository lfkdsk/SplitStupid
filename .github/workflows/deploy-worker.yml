name: Deploy Worker to Cloudflare

# The frontend ships to GitHub Pages via deploy.yml; the backend Worker
# lives on Cloudflare and needs its own `wrangler deploy`. Kept as a
# separate workflow (not a job in deploy.yml) so a Worker deploy failure
# never blocks the Pages deploy and vice-versa, and so we only redeploy
# the Worker when something under worker/ actually changed.
on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

# One Worker deploy at a time; back-to-back pushes coalesce.
concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      # Install from the lockfile so wrangler-action's `npx --no-install
      # wrangler` picks up the project-pinned wrangler 4.x instead of
      # falling back to a stale default — our compatibility_date is newer
      # than that default would support.
      - run: npm ci
        working-directory: worker
      # Idempotent: `wrangler secret put` creates or updates the secret, so it
      # is safe to run before every deploy. The value comes from GitHub Actions
      # secrets and is never committed into wrangler.toml.
      - name: Configure Worker session secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          if [ -z "${SESSION_SECRET:-}" ]; then
            echo "Missing GitHub secret: SESSION_SECRET"
            exit 1
          fi

          printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
        working-directory: worker
      # wrangler-action runs `wrangler deploy` in worker/. Database id /
      # bindings come from worker/wrangler.toml; only credentials inject here.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
