name: Migrate Worker D1 Database

on:
  push:
    branches: [master]
    paths:
      - 'worker/migrations/**'
      - 'worker/package-lock.json'
      - 'worker/package.json'
      - 'worker/wrangler.toml'
      - '.github/workflows/migrate-worker-db.yml'
  workflow_dispatch:

permissions:
  contents: read

# D1 migrations must run serially; back-to-back schema pushes queue instead
# of racing against the same remote migrations table.
concurrency:
  group: migrate-worker-d1
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm run db:migrate
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
