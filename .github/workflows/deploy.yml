name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Pages deployments need to write to the `gh-pages` environment via the
# OIDC id-token; the action enforces these scopes.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time per branch — back-to-back pushes
# coalesce instead of racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Vite picks up .env.production automatically; no need to inject
      # VITE_OAUTH_* here. public/CNAME is copied into dist/ verbatim so
      # GitHub Pages can read it as the custom domain.
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
