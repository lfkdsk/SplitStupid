# Cloudflare Worker config for splitstupid-data — the SplitStupid backend.
# Sibling Worker to lfkdsk-auth in the same CF account, on the same free
# plan. Custom domain api.splitstupid.lfkdsk.org is set up via the CF
# dashboard (Workers → this worker → Settings → Triggers → Routes).

name = "splitstupid-data"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "splitstupid"
# Paste the database_id you got from `npx wrangler d1 create splitstupid`
# here. The init shows it once on creation.
database_id = "c716062a-f103-420b-9c23-c6921ad5360c"
# `npm run db:migrate` (wrangler d1 migrations apply) reads these *.sql files
# in order and tracks what's applied in a d1_migrations table — no more
# hand-running each new file. Defaults shown explicitly for the next reader.
migrations_dir = "migrations"
migrations_table = "d1_migrations"

[vars]
# Origins allowed to talk to this Worker. Worker echoes the request's
# Origin if it matches one of these, otherwise CORS rejects.
ALLOWED_ORIGINS = "https://splitstupid.lfkdsk.org,http://localhost:5180"
# Comma-separated GH logins allowed on the read-only /admin/* routes. This is
# the actual access boundary for admin reads; the frontend's VITE_ADMIN_LOGINS
# only governs whether the Admin link shows. Compared case-insensitively.
ADMIN_LOGINS = "lfkdsk"
